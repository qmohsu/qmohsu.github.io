{{ define "main" }}
<article>
  <p class="news-date">{{ .Date.Format "2 January 2006" }}</p>
  {{ with .Params.category }}<span class="news-category">{{ . }}</span>{{ end }}
  <h1>{{ .Title }}</h1>
  {{ with .Params.image }}
    <img src="{{ . | relURL }}" alt="" style="max-width:100%;border-radius:var(--radius);margin:14px 0;">
  {{ end }}
  {{ .Content }}
  {{ with .Params.source_url }}
  <p class="news-source">Source: <a href="{{ . }}" target="_blank" rel="noopener">{{ with $.Params.source_site }}{{ . }}{{ else }}External{{ end }}</a></p>
  {{ end }}
</article>
{{ end }}
