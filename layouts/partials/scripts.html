<script>
(function () {
  'use strict';

  /* ---------- Tabs (Case studies, etc.) ---------- */
  document.querySelectorAll('[data-tabs]').forEach(function (tabs) {
    var btns = tabs.querySelectorAll('.tab-btn');
    var panels = tabs.querySelectorAll('.tab-panel');
    btns.forEach(function (btn) {
      btn.addEventListener('click', function () {
        var key = btn.getAttribute('data-tab');
        btns.forEach(function (b) {
          var active = b === btn;
          b.classList.toggle('is-active', active);
          b.setAttribute('aria-selected', active ? 'true' : 'false');
        });
        panels.forEach(function (p) {
          p.classList.toggle('is-active', p.getAttribute('data-panel') === key);
        });
      });
    });
  });

  /* ---------- Scroll reveal (fade-in cards as they enter viewport) ---------- */
  var revealTargets = document.querySelectorAll(
    '.effect-card, .stat-card, .cap-card, .work-card, .leader-card, .lane-card, .layer-card, .funding-card, ' +
    '.lane-col, .partner-section h2, .page-part, ' +
    '.reveal, .media-source-row, .media-reel-tile, .media-visual-card, .outlet-chip, .press-kit-card, .home-block h2, .home-section h2, .section-h2, .record-grid li'
  );
  revealTargets.forEach(function (el) { el.classList.add('reveal-target'); });

  var parseNonNegativeNumber = function (value, fallback) {
    var text = String(value || '').trim();
    var parsed = parseFloat(text);
    if (!text || !/^(?:\d+\.?\d*|\.\d+)$/.test(text) || !isFinite(parsed) || parsed < 0) return fallback;
    return parsed;
  };
  var parseRevealDuration = function (value) {
    var match = String(value || '').trim().match(/^([+-]?(?:\d+\.?\d*|\.\d+))(ms|s)$/);
    if (!match) return 700;
    var amount = parseFloat(match[1]);
    if (!isFinite(amount) || amount < 0) return 700;
    var duration = match[2] === 's' ? amount * 1000 : amount;
    if (!isFinite(duration) || duration < 0) return 700;
    return duration;
  };

  var revealEffectCard = function (el, delay) {
    var complete = false;
    var revealDuration = parseRevealDuration(window.getComputedStyle(el).getPropertyValue('--effect-card-reveal-duration'));
    var fallbackTimer;
    var finish = function () {
      if (complete) return;
      complete = true;
      window.clearTimeout(fallbackTimer);
      el.removeEventListener('transitionend', onTransitionEnd);
      el.style.transitionDelay = '';
      el.classList.remove('is-revealing');
      el.classList.add('is-reveal-complete');
    };
    var onTransitionEnd = function (event) {
      if (event.target === el && (event.propertyName === 'opacity' || event.propertyName === 'transform')) finish();
    };

    el.classList.add('is-revealing');
    el.style.transitionDelay = delay + 'ms';
    el.addEventListener('transitionend', onTransitionEnd);
    el.classList.add('is-revealed');

    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      finish();
    } else {
      fallbackTimer = window.setTimeout(finish, delay + revealDuration + 100);
    }
  };

  if ('IntersectionObserver' in window) {
    var io = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting) {
          var el = entry.target;
          var fallbackDelay = el.parentNode ? [].indexOf.call(el.parentNode.children, el) * 80 : 0;
          var delay = parseNonNegativeNumber(el.dataset.revealDelay, fallbackDelay);
          delay = delay > 600 ? 600 : delay;
          if (el.classList.contains('effect-card')) revealEffectCard(el, delay);
          else {
            el.style.transitionDelay = delay + 'ms';
            el.classList.add('is-revealed');
          }
          io.unobserve(el);
        }
      });
    }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
    revealTargets.forEach(function (el) { io.observe(el); });
  } else {
    revealTargets.forEach(function (el) {
      el.classList.add('is-revealed');
      if (el.classList.contains('effect-card')) el.classList.add('is-reveal-complete');
    });
  }

  /* ---------- Animated counter for big numbers ---------- */
  var parseStat = function (text) {
    var t = (text || '').trim();
    // Match patterns: "400M+", "1.3M+", "20", "65", "9+", "300M+", "12×", "32M+"
    var m = t.match(/^([\d.]+)([KMB]?)(\+|x|×)?$/);
    if (!m) return null;
    var value = parseFloat(m[1]);
    var mag = m[2] || '';
    var tail = m[3] || '';
    if (isNaN(value)) return null;
    return { value: value, magnitude: mag, tail: tail, originalDecimals: (m[1].indexOf('.') >= 0) ? 1 : 0 };
  };

  var format = function (current, info) {
    var v = info.originalDecimals ? current.toFixed(info.originalDecimals) : Math.round(current).toString();
    return v + info.magnitude + info.tail;
  };

  var animate = function (el, info) {
    var start = performance.now();
    var duration = 1100;
    var ease = function (t) { return 1 - Math.pow(1 - t, 3); };
    var tick = function (now) {
      var t = Math.min(1, (now - start) / duration);
      var current = info.value * ease(t);
      el.textContent = format(current, info);
      if (t < 1) requestAnimationFrame(tick);
      else el.textContent = format(info.value, info);
    };
    requestAnimationFrame(tick);
  };

  if ('IntersectionObserver' in window) {
    var countIo = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting) {
          var el = entry.target;
          var original = el.dataset.originalText;
          if (original === undefined) {
            original = el.textContent;
            el.dataset.originalText = original;
          }
          var info = parseStat(original);
          if (info) {
            el.textContent = format(0, info);
            animate(el, info);
          }
          countIo.unobserve(el);
        }
      });
    }, { threshold: 0.5 });
    document.querySelectorAll('.stat-num').forEach(function (el) { countIo.observe(el); });
  }

  /* ---------- Sticky section nav: smooth click + active tracking ---------- */
  var sectionNav = document.querySelector('[data-section-nav]');
  if (sectionNav) {
    var navHeight = function () { return sectionNav.offsetHeight || 56; };
    var navLinks = sectionNav.querySelectorAll('.section-nav-link');
    var linkMap = {};
    navLinks.forEach(function (lnk) {
      var t = lnk.getAttribute('data-nav-target');
      if (t) linkMap[t] = lnk;
    });

    /* click → smooth scroll, compensating for sticky nav height */
    navLinks.forEach(function (lnk) {
      lnk.addEventListener('click', function (ev) {
        var t = lnk.getAttribute('data-nav-target');
        var sec = document.getElementById(t);
        if (sec) {
          ev.preventDefault();
          var top = sec.getBoundingClientRect().top + window.pageYOffset - navHeight() - 4;
          window.scrollTo({ top: top, behavior: 'smooth' });
        }
      });
    });

    /* active link tracking via IntersectionObserver */
    if ('IntersectionObserver' in window) {
      var setActive = function (id) {
        navLinks.forEach(function (lnk) {
          lnk.classList.toggle('is-active', lnk.getAttribute('data-nav-target') === id);
        });
      };
      var sectionIds = Object.keys(linkMap);
      var visibility = {};
      var navIo = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          visibility[entry.target.id] = entry.intersectionRatio;
        });
        var maxId = null, maxRatio = 0;
        sectionIds.forEach(function (id) {
          if ((visibility[id] || 0) > maxRatio) {
            maxRatio = visibility[id];
            maxId = id;
          }
        });
        if (maxId) setActive(maxId);
      }, {
        root: null,
        threshold: [0, 0.15, 0.4, 0.7, 1],
        rootMargin: '-90px 0px -40% 0px'
      });
      sectionIds.forEach(function (id) {
        var el = document.getElementById(id);
        if (el) navIo.observe(el);
      });
    }
  }

  /* ---------- Hero ticker — fake "live" GNSS readings with typewriter ---------- */
  var ticker = document.querySelector('[data-hero-ticker]');
  if (ticker) {
    var satEl = ticker.querySelector('[data-sat-count]');
    var hdopEl = ticker.querySelector('[data-hdop]');
    var typeInto = function (el, newText) {
      if (!el) return;
      if (el._timer) clearInterval(el._timer);
      el.classList.add('is-typing');
      el.textContent = '';
      var i = 0;
      el._timer = setInterval(function () {
        if (i >= newText.length) {
          clearInterval(el._timer);
          el.classList.remove('is-typing');
          return;
        }
        el.textContent += newText.charAt(i++);
      }, 38);
    };
    var tick = function () {
      var visible = 11 + Math.floor(Math.random() * 6);   /* 11-16 */
      var hdop = (0.7 + Math.random() * 0.5).toFixed(1);  /* 0.7-1.2 */
      typeInto(satEl, visible + ' / 24');
      setTimeout(function () { typeInto(hdopEl, hdop); }, 280);
    };
    tick();
    setInterval(tick, 2800);
  }

  /* ---------- 3D mouse tilt on key cards ---------- */
  var canTilt = !window.matchMedia('(prefers-reduced-motion: reduce)').matches &&
    window.matchMedia('(hover: hover) and (pointer: fine)').matches;
  if (canTilt) {
    var tiltCards = document.querySelectorAll(
      '.effect-card, .stat-card, .cap-card, .work-card, .leader-card, .lane-card, .tab-stat'
    );
    var maxTilt = 5.5; /* degrees */
    tiltCards.forEach(function (card) {
      var rect = null;
      var onEnter = function () { rect = card.getBoundingClientRect(); };
      var onMove = function (e) {
        if (!rect) rect = card.getBoundingClientRect();
        var x = e.clientX - rect.left;
        var y = e.clientY - rect.top;
        var cx = rect.width / 2;
        var cy = rect.height / 2;
        var rotY = ((x - cx) / cx) * maxTilt;
        var rotX = ((cy - y) / cy) * maxTilt;
        card.style.transform =
          'translateY(-5px) perspective(1100px) rotateX(' + rotX.toFixed(2) +
          'deg) rotateY(' + rotY.toFixed(2) + 'deg)';
      };
      var onLeave = function () {
        card.style.transform = '';
        rect = null;
      };
      card.addEventListener('mouseenter', onEnter);
      card.addEventListener('mousemove', onMove);
      card.addEventListener('mouseleave', onLeave);
    });
  }

  /* ---------- PNT viz: interactive stack diagram ---------- */
  document.querySelectorAll('[data-pnt-viz]').forEach(function (viz) {
    var panel = viz.querySelector('.pnt-viz-panel');
    var panelIdx = viz.querySelector('[data-pnt-idx]');
    var panelName = viz.querySelector('[data-pnt-name]');
    var panelTags = viz.querySelector('[data-pnt-tags]');
    var nodes = viz.querySelectorAll('.pnt-node');
    var thumbs = viz.querySelectorAll('.pnt-thumb');
    var locked = false;
    var rotateTimer = null;

    var setActive = function (idx) {
      nodes.forEach(function (n, i) {
        n.classList.toggle('is-active', i === idx);
      });
      thumbs.forEach(function (t, i) {
        t.classList.toggle('is-active', i === idx);
      });
      var node = nodes[idx];
      if (!node) return;
      var color = node.getAttribute('data-color') || 'cyan';
      panel.setAttribute('data-color', color);
      panelIdx.textContent = String(idx + 1).padStart(2, '0');
      panelName.textContent = node.getAttribute('data-name') || '';
      panelTags.textContent = node.getAttribute('data-tags') || '';
    };

    var startRotate = function () {
      if (rotateTimer) clearInterval(rotateTimer);
      var i = 0;
      setActive(0);
      rotateTimer = setInterval(function () {
        if (locked) return;
        i = (i + 1) % nodes.length;
        setActive(i);
      }, 3200);
    };

    nodes.forEach(function (n, i) {
      n.addEventListener('mouseenter', function () { locked = true; setActive(i); });
      n.addEventListener('mouseleave', function () {
        setTimeout(function () { locked = false; }, 600);
      });
      n.addEventListener('click', function () {
        locked = true; setActive(i);
        if (rotateTimer) { clearInterval(rotateTimer); rotateTimer = null; }
      });
    });
    thumbs.forEach(function (t, i) {
      t.style.cursor = 'pointer';
      t.addEventListener('mouseenter', function () { locked = true; setActive(i); });
      t.addEventListener('mouseleave', function () {
        setTimeout(function () { locked = false; }, 600);
      });
      t.addEventListener('click', function () {
        locked = true; setActive(i);
        if (rotateTimer) { clearInterval(rotateTimer); rotateTimer = null; }
      });
    });

    /* Only auto-rotate when viz is in viewport */
    if ('IntersectionObserver' in window) {
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) {
            if (!rotateTimer) startRotate();
          } else {
            if (rotateTimer) { clearInterval(rotateTimer); rotateTimer = null; }
          }
        });
      }, { threshold: 0.25 });
      io.observe(viz);
    } else {
      startRotate();
    }
  });

  /* ---------- Smooth in-page anchor scroll (fallback for any other #links) ---------- */
  document.querySelectorAll('a[href^="#"]:not(.section-nav-link)').forEach(function (a) {
    a.addEventListener('click', function (ev) {
      var id = a.getAttribute('href');
      if (id.length > 1) {
        var target = document.querySelector(id);
        if (target) {
          ev.preventDefault();
          var stickyOffset = sectionNav ? sectionNav.offsetHeight + 4 : 0;
          var top = target.getBoundingClientRect().top + window.pageYOffset - stickyOffset;
          window.scrollTo({ top: top, behavior: 'smooth' });
        }
      }
    });
  });
})();
</script>

<script>
(function () {
  'use strict';

  var modal = document.querySelector('[data-site-search-modal]');
  var activeModalInput = null;
  var pagefindPromise = null;
  var lang = (document.documentElement.getAttribute('lang') || 'en').toLowerCase();
  var langPrefix = lang.indexOf('zh-cn') === 0 ? '/zh-cn/' : (lang.indexOf('zh-tw') === 0 ? '/zh-tw/' : '/en/');
  var sectionLabels = {
    home: lang.indexOf('zh-cn') === 0 ? '首页' : (lang.indexOf('zh-tw') === 0 ? '首頁' : 'Home'),
    research: lang.indexOf('zh-cn') === 0 ? '研究' : (lang.indexOf('zh-tw') === 0 ? '研究' : 'Research'),
    projects: lang.indexOf('zh-cn') === 0 ? '项目' : (lang.indexOf('zh-tw') === 0 ? '專案' : 'Projects'),
    publications: lang.indexOf('zh-cn') === 0 ? '论文' : (lang.indexOf('zh-tw') === 0 ? '論文' : 'Publications'),
    people: lang.indexOf('zh-cn') === 0 ? '团队' : (lang.indexOf('zh-tw') === 0 ? '團隊' : 'People'),
    news: lang.indexOf('zh-cn') === 0 ? '新闻' : (lang.indexOf('zh-tw') === 0 ? '新聞' : 'News'),
    media: lang.indexOf('zh-cn') === 0 ? '媒体' : (lang.indexOf('zh-tw') === 0 ? '媒體' : 'Media'),
    resources: lang.indexOf('zh-cn') === 0 ? '资源' : (lang.indexOf('zh-tw') === 0 ? '資源' : 'Resources'),
    teaching: lang.indexOf('zh-cn') === 0 ? '教学' : (lang.indexOf('zh-tw') === 0 ? '教學' : 'Teaching'),
    engage: lang.indexOf('zh-cn') === 0 ? '合作' : (lang.indexOf('zh-tw') === 0 ? '合作' : 'Engage')
  };

  function loadPagefind() {
    if (!pagefindPromise) {
      pagefindPromise = import('/pagefind/pagefind.js?v={{ now.Unix }}').then(function (pagefind) {
        if (pagefind.options) {
          pagefind.options({ excerptLength: 28 });
        }
        return pagefind;
      });
    }
    return pagefindPromise;
  }

  function normalizePath(url) {
    try {
      var parsed = new URL(url, window.location.origin);
      return parsed.pathname.replace(/\/index\.html$/, '/');
    } catch (error) {
      return String(url || '').replace(/\/index\.html$/, '/');
    }
  }

  function resultSection(path) {
    var clean = path;
    if (clean.indexOf(langPrefix) === 0) clean = clean.slice(langPrefix.length);
    clean = clean.replace(/^\/+|\/+$/g, '');
    if (!clean) return 'home';
    return clean.split('/')[0] || 'home';
  }

  function sameLanguage(path) {
    return path === langPrefix || path.indexOf(langPrefix) === 0;
  }

  function resultHref(path) {
    return path || langPrefix;
  }

  function plainText(value) {
    return String(value || '').replace(/<[^>]+>/g, ' ');
  }

  function normalizeSearchText(value) {
    return plainText(value)
      .normalize('NFKD')
      .replace(/[\u0300-\u036f]/g, '')
      .toLowerCase();
  }

  function queryTokens(query) {
    return normalizeSearchText(query)
      .split(/[^a-z0-9]+/)
      .filter(function (token) { return token.length >= 2; });
  }

  function countTokenPrefixes(text, tokens) {
    if (!tokens.length) return 0;
    var words = text.split(/[^a-z0-9]+/).filter(Boolean);
    var count = 0;
    tokens.forEach(function (token) {
      var matched = words.some(function (word) {
        return word.indexOf(token) === 0;
      });
      if (matched) count += 1;
    });
    return count;
  }

  function scoreSearchResult(item, query) {
    var normalizedQuery = normalizeSearchText(query).trim();
    if (!normalizedQuery) return { score: 0, reliable: true };

    var tokens = queryTokens(query);
    var title = normalizeSearchText(item.title);
    var path = normalizeSearchText((item.path || '').replace(/[-_/]+/g, ' '));
    var excerpt = normalizeSearchText(item.excerpt);
    var content = normalizeSearchText(item.content);
    var score = 0;
    var reliable = false;

    if (title.indexOf(normalizedQuery) !== -1) {
      score += 12000;
      reliable = true;
    }
    if (path.indexOf(normalizedQuery) !== -1) {
      score += 8000;
      reliable = true;
    }
    if (content.indexOf(normalizedQuery) !== -1) {
      score += 5000;
      reliable = true;
    }
    if (excerpt.indexOf(normalizedQuery) !== -1) {
      score += 4000;
      reliable = true;
    }

    if (tokens.length) {
      var titlePrefixes = countTokenPrefixes(title, tokens);
      var pathPrefixes = countTokenPrefixes(path, tokens);
      var contentPrefixes = countTokenPrefixes(content, tokens);
      if (titlePrefixes === tokens.length) {
        score += 5000;
        reliable = true;
      }
      if (pathPrefixes === tokens.length) {
        score += 2500;
        reliable = true;
      }
      if (contentPrefixes === tokens.length) {
        score += 1500;
        reliable = true;
      }
    }

    if (item.section === 'people' && (title.indexOf(normalizedQuery) !== -1 || path.indexOf(normalizedQuery) !== -1)) {
      score += 1500;
    }

    return { score: score, reliable: reliable };
  }

  function rankSearchResults(items, query) {
    var scored = items.map(function (item, index) {
      var relevance = scoreSearchResult(item, query);
      item.pagefindRank = index;
      item.relevanceScore = relevance.score;
      item.reliableMatch = relevance.reliable;
      return item;
    });
    var reliable = scored.filter(function (item) { return item.reliableMatch; });
    var ranked = reliable.length ? reliable : scored;
    return ranked.sort(function (a, b) {
      if (b.relevanceScore !== a.relevanceScore) return b.relevanceScore - a.relevanceScore;
      return a.pagefindRank - b.pagefindRank;
    });
  }

  function labelsFor(container) {
    var root = container.closest('[data-ready]') || container;
    return {
      ready: root.dataset.ready || '',
      loading: root.dataset.loading || '',
      empty: root.dataset.empty || '',
      unavailable: root.dataset.unavailable || ''
    };
  }

  function resultCountText(count) {
    if (lang.indexOf('zh-cn') === 0) return count + ' 条结果';
    if (lang.indexOf('zh-tw') === 0) return count + ' 筆結果';
    return count + (count === 1 ? ' result' : ' results');
  }

  function buildResultCard(item) {
    var link = document.createElement('a');
    link.className = 'site-search-result';
    link.href = resultHref(item.path);

    var meta = document.createElement('div');
    meta.className = 'site-search-result-meta';
    meta.textContent = item.sectionLabel;

    var title = document.createElement('h3');
    title.textContent = item.title || item.path;

    var excerpt = document.createElement('p');
    excerpt.innerHTML = item.excerpt || '';

    var url = document.createElement('span');
    url.className = 'site-search-result-url';
    url.textContent = item.path;

    link.appendChild(meta);
    link.appendChild(title);
    if (item.excerpt) link.appendChild(excerpt);
    link.appendChild(url);
    return link;
  }

  function createController(container) {
    var input = container.querySelector('[data-site-search-input]');
    var status = container.querySelector('[data-site-search-status]');
    var resultsEl = container.querySelector('[data-site-search-results]');
    var filterButtons = container.querySelectorAll('[data-site-search-filter]');
    var labels = labelsFor(container);
    var state = { query: '', filter: 'all', items: [], pendingTimer: null };
    var isPageSearch = container.hasAttribute('data-site-search-page');

    function visibleItems() {
      return state.items.filter(function (item) {
        return state.filter === 'all' || item.section === state.filter;
      });
    }

    function setStatus(text) {
      if (status) status.textContent = text || '';
    }

    function render() {
      if (!resultsEl) return;
      var matches = visibleItems();
      resultsEl.replaceChildren();
      if (!state.query) {
        setStatus(labels.ready);
        return;
      }
      if (!matches.length) {
        setStatus(labels.empty);
        return;
      }
      setStatus(resultCountText(matches.length));
      matches.slice(0, 30).forEach(function (item) {
        resultsEl.appendChild(buildResultCard(item));
      });
    }

    function syncUrl() {
      if (!isPageSearch) return;
      var params = new URLSearchParams(window.location.search);
      if (state.query) params.set('q', state.query);
      else params.delete('q');
      if (state.filter && state.filter !== 'all') params.set('section', state.filter);
      else params.delete('section');
      var next = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
      window.history.replaceState(null, '', next);
    }

    function normalizeResult(data) {
      var path = normalizePath(data.url);
      if (!sameLanguage(path)) return null;
      var section = resultSection(path);
      if (!sectionLabels[section]) section = 'home';
      return {
        path: path,
        section: section,
        sectionLabel: sectionLabels[section],
        title: data.meta && data.meta.title ? data.meta.title : data.title,
        excerpt: data.excerpt || '',
        content: data.raw_content || data.content || data.plain_excerpt || ''
      };
    }

    function runSearch() {
      state.query = (input.value || '').trim();
      syncUrl();
      if (!state.query) {
        state.items = [];
        render();
        return;
      }
      setStatus(labels.loading);
      loadPagefind()
        .then(function (pagefind) {
          return pagefind.search(state.query);
        })
        .then(function (search) {
          return Promise.all(search.results.slice(0, 80).map(function (result) {
            return result.data();
          }));
        })
        .then(function (items) {
          state.items = rankSearchResults(items.map(normalizeResult).filter(Boolean), state.query);
          render();
        })
        .catch(function () {
          state.items = [];
          if (resultsEl) resultsEl.replaceChildren();
          setStatus(labels.unavailable);
        });
    }

    function scheduleSearch() {
      if (state.pendingTimer) clearTimeout(state.pendingTimer);
      state.pendingTimer = setTimeout(runSearch, 140);
    }

    if (!input) return null;
    input.addEventListener('input', scheduleSearch);
    filterButtons.forEach(function (button) {
      button.addEventListener('click', function () {
        state.filter = button.dataset.siteSearchFilter || 'all';
        filterButtons.forEach(function (other) {
          other.classList.toggle('is-active', other === button);
        });
        syncUrl();
        render();
      });
    });

    if (isPageSearch) {
      var params = new URLSearchParams(window.location.search);
      var queryParam = params.get('q');
      var sectionParam = params.get('section');
      if (sectionParam) {
        filterButtons.forEach(function (button) {
          var active = button.dataset.siteSearchFilter === sectionParam;
          button.classList.toggle('is-active', active);
          if (active) state.filter = sectionParam;
        });
      }
      if (queryParam) {
        input.value = queryParam;
        runSearch();
      } else {
        render();
      }
    } else {
      render();
    }

    return {
      focus: function () { input.focus(); },
      input: input,
      runSearch: runSearch
    };
  }

  var controllers = [];
  document.querySelectorAll('[data-site-search]').forEach(function (container) {
    var controller = createController(container);
    if (controller) controllers.push(controller);
  });

  function openModal() {
    if (!modal) return;
    modal.hidden = false;
    document.documentElement.classList.add('site-search-is-open');
    activeModalInput = modal.querySelector('[data-site-search-input]');
    setTimeout(function () {
      if (activeModalInput) activeModalInput.focus();
    }, 30);
  }

  function closeModal() {
    if (!modal || modal.hidden) return;
    modal.hidden = true;
    document.documentElement.classList.remove('site-search-is-open');
  }

  document.querySelectorAll('[data-site-search-open]').forEach(function (trigger) {
    trigger.addEventListener('click', function (event) {
      if (!modal) return;
      event.preventDefault();
      openModal();
    });
  });

  document.querySelectorAll('[data-site-search-close]').forEach(function (trigger) {
    trigger.addEventListener('click', closeModal);
  });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'Escape') closeModal();
    if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'k') {
      if (!modal) return;
      event.preventDefault();
      openModal();
    }
  });
})();
</script>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js" defer></script>
<script defer>
(function () {
  'use strict';
  var ready = function () {
    var el = document.getElementById('pub-charts');
    if (!el || typeof Chart === 'undefined') return;
    var parse = function (k) { try { return JSON.parse(el.dataset[k] || '[]'); } catch (e) { return []; } };
    var yearLabels = parse('yearLabels');
    var yearValues = parse('yearValues');
    var typeLabels = parse('typeLabels');
    var typeValues = parse('typeValues');
    var cumLabels = parse('cumLabels');
    var cumValues = parse('cumValues');
    var cyan = '#2D3B97', cyanBright = '#3A4DB8', orange = '#D3313A', orangeDeep = '#C02A33', navy = '#2D3B97', mute = '#7B7F92';

    /* Localised legend labels (drive from <html lang>) */
    var lang = document.documentElement.lang || '';
    var L_PUB = lang.indexOf('zh-cn') === 0 ? '论文' : (lang.indexOf('zh-tw') === 0 ? '論文' : 'Publications');
    var L_CUM = lang.indexOf('zh-cn') === 0 ? '累计' : (lang.indexOf('zh-tw') === 0 ? '累計' : 'Cumulative');

    /* ---- Year chart: bar + cumulative line ---- */
    var yc = document.getElementById('pub-chart-year');
    if (yc) {
      new Chart(yc, {
        type: 'bar',
        data: {
          labels: yearLabels,
          datasets: [
            {
              type: 'bar',
              label: L_PUB,
              data: yearValues,
              backgroundColor: function (ctx) {
                var c = ctx.chart.ctx, g = c.createLinearGradient(0, 0, 0, 220);
                g.addColorStop(0, cyanBright); g.addColorStop(1, cyan);
                return g;
              },
              borderRadius: 4,
              borderSkipped: false,
              barPercentage: 0.72,
              order: 2
            },
            {
              type: 'line',
              label: L_CUM,
              data: cumValues,
              borderColor: orange,
              backgroundColor: 'rgba(211,49,58,0.08)',
              borderWidth: 2,
              pointRadius: 3,
              pointBackgroundColor: orange,
              tension: 0.32,
              fill: true,
              yAxisID: 'y2',
              order: 1
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: { duration: 1500, easing: 'easeOutCubic' },
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: {
              labels: {
                font: { family: "'IBM Plex Mono', monospace", size: 11 },
                color: mute, usePointStyle: true, pointStyle: 'rect'
              }
            },
            tooltip: {
              backgroundColor: '#161B40', titleFont: { family: "'IBM Plex Mono', monospace" },
              bodyFont: { family: "'Inter', sans-serif" }, padding: 10, borderColor: cyan, borderWidth: 1
            }
          },
          scales: {
            x: {
              ticks: { color: mute, font: { family: "'IBM Plex Mono', monospace", size: 10 } },
              grid: { display: false }
            },
            y: {
              beginAtZero: true,
              ticks: { color: mute, font: { family: "'IBM Plex Mono', monospace", size: 10 }, precision: 0 },
              grid: { color: 'rgba(0,0,0,0.05)' }
            },
            y2: {
              position: 'right',
              beginAtZero: true,
              ticks: { color: orange, font: { family: "'IBM Plex Mono', monospace", size: 10 }, precision: 0 },
              grid: { display: false }
            }
          }
        }
      });
    }

    /* ---- Citations chart: area line ---- */
    var cc = document.getElementById('pub-chart-cites');
    if (cc) {
      var citeLabels = parse('citeLabels');
      var citeValues = parse('citeValues');
      new Chart(cc, {
        type: 'line',
        data: {
          labels: citeLabels,
          datasets: [{
            label: 'Cumulative citations',
            data: citeValues,
            borderColor: orange,
            backgroundColor: function (ctx) {
              var c = ctx.chart.ctx, g = c.createLinearGradient(0, 0, 0, 220);
              g.addColorStop(0, 'rgba(211,49,58,0.35)');
              g.addColorStop(1, 'rgba(211,49,58,0)');
              return g;
            },
            borderWidth: 2.5,
            pointBackgroundColor: orange,
            pointBorderColor: '#fff',
            pointBorderWidth: 1.5,
            pointRadius: 4,
            pointHoverRadius: 6,
            tension: 0.35,
            fill: true
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: { duration: 1600, easing: 'easeOutCubic' },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#161B40', borderColor: orange, borderWidth: 1, padding: 10,
              titleFont: { family: "'IBM Plex Mono', monospace" },
              bodyFont: { family: "'Inter', sans-serif" },
              callbacks: { label: function (ctx) { return ctx.parsed.y.toLocaleString() + ' citations'; } }
            }
          },
          scales: {
            x: {
              ticks: { color: mute, font: { family: "'IBM Plex Mono', monospace", size: 10 } },
              grid: { display: false }
            },
            y: {
              beginAtZero: true,
              ticks: { color: mute, font: { family: "'IBM Plex Mono', monospace", size: 10 },

              grid: { color: 'rgba(0,0,0,0.05)' }
            }
          }
        }
      });
    }

    /* ---- Type chart: doughnut ---- */
    var tc = document.getElementById('pub-chart-type');
    if (tc) {
      var palette = [cyan, orange, navy, '#5b3b8c', '#1e6b3a', '#B12A32'];
      new Chart(tc, {
        type: 'doughnut',
        data: {
          labels: typeLabels,
          datasets: [{
            data: typeValues,
            backgroundColor: typeValues.map(function (_, i) { return palette[i % palette.length]; }),
            borderColor: '#fff', borderWidth: 2, hoverOffset: 8

        },
        options: {
          responsive: true, maintainAspectRatio: false,
          cutout: '62%',
          animation: { animateRotate: true, duration: 1400, easing: 'easeOutCubic' },
          plugins: {
            legend: {
              position: 'right',
              labels: {
                font: { family: "'IBM Plex Mono', monospace", size: 11 },
                color: '#444', usePointStyle: true, pointStyle: 'rect', padding: 10
              }
            },
            tooltip: {
              backgroundColor: '#161B40', borderColor: cyan, borderWidth: 1, padding: 10
            }
          }
        }
      });
    }
  };
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function () { setTimeout(ready, 50); });
  } else {
    setTimeout(ready, 50);
  }
})();
</script>
