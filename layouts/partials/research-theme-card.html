<div class="card effect-card theme-card accent-{{ default 0 .Weight }}">
  <h3><a href="{{ .Permalink }}">{{ .Title }}</a></h3>
  {{ with .Description }}<p>{{ . }}</p>{{ end }}
  {{ with .Params.keywords }}
  <div class="keywords">
    {{ range . }}<span>{{ . }}</span>{{ end }}
  </div>
  {{ end }}
</div>
