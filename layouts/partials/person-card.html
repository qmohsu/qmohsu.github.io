<div class="card person-card">
  {{ if .Params.photo }}
    <img class="photo" src="{{ .Params.photo }}" alt="{{ .Title }}">
  {{ else }}
    <div class="photo-placeholder" role="img" aria-label="{{ .Title }} (photo pending)">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
    </div>
  {{ end }}
  <h3><a href="{{ .Permalink }}">{{ .Title }}</a></h3>
  <p class="role">{{ .Params.role }}</p>
  {{ with .Params.subtitle }}<p class="role role-subtitle">{{ . }}</p>{{ end }}
  {{ with .Params.years }}<p class="role">{{ . }}</p>{{ end }}
  {{ if eq .Params.status "alumni" }}
    {{ with .Params.current_position }}<p class="role" style="font-size:0.8rem;margin-top:4px;">Now: {{ . }}</p>{{ end }}
  {{ end }}
</div>
