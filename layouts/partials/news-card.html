{{ $thumb := .Params.image }}
{{ if not $thumb }}{{ with .Params.images }}{{ $thumb = index . 0 }}{{ end }}{{ end }}
<article class="news-card{{ if $thumb }} news-card-imaged{{ else }} news-card-textonly{{ end }}">
  <a class="news-card-link" href="{{ .Permalink }}">
    {{ with $thumb }}
    <div class="news-card-img" style="background-image:url('{{ . }}');"></div>
    {{ end }}
    <div class="news-card-body">
      <div class="news-card-meta">
        <span class="news-card-date">{{ .Date.Format "2 Jan 2006" }}</span>
        {{ with .Params.category }}<span class="news-card-cat">{{ . }}</span>{{ end }}
      </div>
      <h3 class="news-card-title">{{ .Title }}</h3>
      {{ with .Params.summary }}<p class="news-card-summary">{{ . }}</p>{{ end }}
    </div>
  </a>
</article>
