heading:
  en:
    eyebrow: "PUBLIC RESEARCH NETWORK"
    title: "Selected academic and research collaborators"
    intro: "A curated set of public research collaborations, datasets, testbeds, and application partners connected to IPNL's published work and project pages."
  zh-cn:
    eyebrow: "公开研究网络"
    title: "精选学术与研究合作"
    intro: "以下为与 IPNL 公开论文、开放数据集、测试场景和项目页面相连接的研究合作案例。"
  zh-tw:
    eyebrow: "公開研究網絡"
    title: "精選學術與研究合作"
    intro: "以下為與 IPNL 公開論文、開放資料集、測試場景和專案頁面相連的研究合作案例。"
items:
  - name: "UC Berkeley MSC Lab"
    logo: "/images/partners/uc-berkeley-20260701.svg"
    url: "/projects/urbanloco/"
    evidence_url: "/projects/urbanloco/"
    source_url: "https://github.com/weisongwen/UrbanLoco"
    usage_note: "Official Berkeley logo asset downloaded from berkeley.edu for nominative identification of the public UrbanLoco collaborator."
    context:
      en: "UrbanLoco open dataset released with the Mechanical Systems Control Lab at UC Berkeley."
      zh-cn: "UrbanLoco 开放数据集与 UC Berkeley 机械系统控制实验室联合发布。"
      zh-tw: "UrbanLoco 開放資料集與 UC Berkeley 機械系統控制實驗室聯合發布。"
  - name: "NYU Langone Health"
    logo: "/images/partners/nyu-langone.jpg"
    url: "/projects/3dma-gnss/"
    evidence_url: "/projects/3dma-gnss/"
    source_url: "https://nyulangone.org/"
    usage_note: "Existing public-site logo asset reused for nominative identification; no new logo file added in this change."
    context:
      en: "3D map-aided GNSS research for assistive navigation in dense urban environments."
      zh-cn: "面向密集城市环境辅助导航的 3D 地图辅助 GNSS 研究。"
      zh-tw: "面向密集城市環境輔助導航的 3D 地圖輔助 GNSS 研究。"
  - name: "Hong Kong Sports Institute"
    logo: "/images/partners/hksi.png"
    url: "/projects/smart-windsurf-monitoring/"
    evidence_url: "/projects/smart-windsurf-monitoring/"
    source_url: "https://www.hksi.org.hk/"
    usage_note: "Existing public-site logo asset reused for nominative identification; no new logo file added in this change."
    context:
      en: "Sports-science research collaboration for elite windsurfing."
      zh-cn: "面向精英风帆的运动科学研究合作。"
      zh-tw: "面向精英風帆的運動科學研究合作。"
  - name: "Hotel ICON"
    logo: "/images/partners/hotel-icon.png"
    url: "/projects/stairio/"
    evidence_url: "/projects/stairio/"
    source_url: "https://www.hotel-icon.com/"
    usage_note: "Existing public-site logo asset reused for nominative identification; Hotel ICON is PolyU's teaching hotel and is represented here as a public testbed partner."
    context:
      en: "Public-building robotics testbed for Stairio autonomous staircase safety monitoring."
      zh-cn: "Stairio 自主楼梯安全巡检机器人在公共建筑中的测试场景。"
      zh-tw: "Stairio 自主樓梯安全巡檢機器人在公共建築中的測試場景。"
