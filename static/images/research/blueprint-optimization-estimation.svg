<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" role="img" aria-label="Factor graph optimization: heterogeneous measurements become factors connecting state nodes over time, solved jointly to produce a trajectory." font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<title>Factor graph optimization over heterogeneous measurements and time</title>
  <style>
    .box rect{fill:#f4f9fd;stroke:#1a5276;stroke-width:1.5}
    .hl rect{fill:#1a5276;stroke:#1a5276}
    .haz rect{fill:#fdeef0;stroke:#a93226;stroke-width:1.5}
    .t{fill:#1a5276;font-size:14px;font-weight:700}
    .s{fill:#333;font-size:11.5px}
    .w{fill:#fff;font-size:14px;font-weight:700}
    .ws{fill:#eaf3fa;font-size:11.5px}
    .ht{fill:#a93226;font-size:13px;font-weight:700}
    .hs{fill:#7b241c;font-size:11px}
    .ar{stroke:#1a5276;stroke-width:2;fill:none;marker-end:url(#a)}
    .lbl{fill:#1a5276;font-size:11px;font-style:italic}
  </style>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#1a5276"/></marker>
  <g class="box"><rect x="20" y="30" width="160" height="40" rx="8"/><text class="t" x="34" y="55">GNSS / INS</text></g>
  <g class="box"><rect x="20" y="95" width="160" height="40" rx="8"/><text class="t" x="34" y="120">carrier &#183; Doppler</text></g>
  <g class="box"><rect x="20" y="160" width="160" height="40" rx="8"/><text class="t" x="34" y="185">maps &#183; perception</text></g>
  <g class="box"><rect x="20" y="225" width="160" height="40" rx="8"/><text class="t" x="34" y="250">constraints</text></g>
  <text class="lbl" x="250" y="40">factor graph over time</text>
  <line class="ar" x1="270" y1="150" x2="600" y2="150"/>
  <circle cx="290" cy="150" r="15" fill="#f4f9fd" stroke="#1a5276" stroke-width="1.5"/><text class="s" x="281" y="155">x&#8321;</text>
  <circle cx="430" cy="150" r="15" fill="#f4f9fd" stroke="#1a5276" stroke-width="1.5"/><text class="s" x="421" y="155">x&#8322;</text>
  <circle cx="570" cy="150" r="15" fill="#f4f9fd" stroke="#1a5276" stroke-width="1.5"/><text class="s" x="561" y="155">x&#8323;</text>
  <rect x="353" y="143" width="14" height="14" fill="#1a5276"/>
  <rect x="493" y="143" width="14" height="14" fill="#1a5276"/>
  <rect x="353" y="96" width="13" height="13" fill="#1a5276"/><line x1="359" y1="109" x2="359" y2="136" stroke="#1a5276" stroke-width="1.5"/>
  <rect x="284" y="205" width="13" height="13" fill="#1a5276"/><line x1="290" y1="205" x2="290" y2="166" stroke="#1a5276" stroke-width="1.5"/>
  <g class="hl"><rect x="250" y="252" width="370" height="48" rx="10"/><text class="w" x="270" y="281">Trajectory &#183; robust, time-consistent state</text></g>
  <path class="ar" d="M180,150 L244,150"/>
  <path class="ar" d="M435,168 L435,250"/>
</svg>
