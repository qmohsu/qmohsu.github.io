<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" role="img" aria-label="Environment-aware PNT: a 3D city model plus GNSS signals drive ray tracing and sky-visibility prediction to detect and correct NLOS, turning the environment into prior information." font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<title>3D map-aided PNT, the city as prior information</title>
  <style>
    .box rect{fill:#f4f9fd;stroke:#1a5276;stroke-width:1.5}
    .hl rect{fill:#1a5276;stroke:#1a5276}
    .haz rect{fill:#fdeef0;stroke:#a93226;stroke-width:1.5}
    .t{fill:#1a5276;font-size:14px;font-weight:700}
    .s{fill:#333;font-size:11.5px}
    .w{fill:#fff;font-size:14px;font-weight:700}
    .ws{fill:#eaf3fa;font-size:11.5px}
    .ht{fill:#a93226;font-size:13px;font-weight:700}
    .hs{fill:#7b241c;font-size:11px}
    .ar{stroke:#1a5276;stroke-width:2;fill:none;marker-end:url(#a)}
    .lbl{fill:#1a5276;font-size:11px;font-style:italic}
  </style>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#1a5276"/></marker>
  <g class="box"><rect x="20" y="40" width="180" height="70" rx="10"/><text class="t" x="34" y="68">3D city model</text><text class="s" x="34" y="90">LiDAR maps &#183; geometry</text></g>
  <g class="box"><rect x="20" y="180" width="180" height="70" rx="10"/><text class="t" x="34" y="208">GNSS signals</text><text class="s" x="34" y="230">raw pseudorange</text></g>
  <g class="box"><rect x="265" y="108" width="185" height="84" rx="10"/><text class="t" x="279" y="136">Ray tracing &amp;</text><text class="t" x="279" y="156">sky visibility</text><text class="s" x="279" y="178">predict NLOS / multipath</text></g>
  <g class="hl"><rect x="515" y="110" width="150" height="80" rx="10"/><text class="w" x="529" y="142">Corrected,</text><text class="w" x="529" y="162">reliable</text><text class="w" x="529" y="182">position</text></g>
  <path class="ar" d="M200,75 C235,80 240,120 263,128"/>
  <path class="ar" d="M200,215 C235,210 240,172 263,162"/>
  <path class="ar" d="M450,150 L513,150"/>
  <text class="lbl" x="230" y="280">environment as prior: predict where signals fail, then fix</text>
</svg>
