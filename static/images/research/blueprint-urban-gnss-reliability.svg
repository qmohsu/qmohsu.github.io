<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" role="img" aria-label="Urban GNSS reliability: clean satellite signals pass through urban hazards (NLOS, multipath, diffraction) producing degraded measurements that are tagged with reliability before downstream use." font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<title>Modeling how GNSS fails in cities and tagging measurement reliability</title>
  <style>
    .box rect{fill:#f4f9fd;stroke:#1a5276;stroke-width:1.5}
    .hl rect{fill:#1a5276;stroke:#1a5276}
    .haz rect{fill:#fdeef0;stroke:#a93226;stroke-width:1.5}
    .t{fill:#1a5276;font-size:14px;font-weight:700}
    .s{fill:#333;font-size:11.5px}
    .w{fill:#fff;font-size:14px;font-weight:700}
    .ws{fill:#eaf3fa;font-size:11.5px}
    .ht{fill:#a93226;font-size:13px;font-weight:700}
    .hs{fill:#7b241c;font-size:11px}
    .ar{stroke:#1a5276;stroke-width:2;fill:none;marker-end:url(#a)}
    .lbl{fill:#1a5276;font-size:11px;font-style:italic}
  </style>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#1a5276"/></marker>
  <g class="box"><rect x="20" y="110" width="150" height="70" rx="10"/><text class="t" x="34" y="140">Satellite</text><text class="t" x="34" y="158">signals</text></g>
  <g class="haz"><rect x="250" y="55" width="180" height="180" rx="10"/><text class="ht" x="266" y="84">Urban hazards</text><text class="hs" x="266" y="110">NLOS reception</text><text class="hs" x="266" y="131">multipath</text><text class="hs" x="266" y="152">diffraction</text><text class="hs" x="266" y="173">Doppler distortion</text><text class="hs" x="266" y="194">heavy-tailed errors</text></g>
  <g class="box"><rect x="510" y="60" width="150" height="80" rx="10"/><text class="t" x="524" y="88">Measurements</text><text class="s" x="524" y="110">pseudorange,</text><text class="s" x="524" y="127">Doppler, C/N0</text></g>
  <g class="hl"><rect x="510" y="160" width="150" height="80" rx="10"/><text class="w" x="524" y="190">Reliability tag</text><text class="ws" x="524" y="214">trust / weight</text></g>
  <path class="ar" d="M170,145 L248,145"/>
  <path class="ar" d="M430,110 C460,105 470,100 508,100"/>
  <path class="ar" d="M430,180 C460,190 470,195 508,195"/>
  <text class="lbl" x="250" y="258">detect + quantify failures at the measurement layer</text>
</svg>
