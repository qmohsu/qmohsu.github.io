<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 220" role="img" aria-label="Software-defined receiver: RF/IF samples flow through acquisition, tracking and vector tracking, and correlator-feature analysis to yield measurements with explicit uncertainty." font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<title>Receiver-level signal processing to measurements with uncertainty</title>
  <style>
    .box rect{fill:#f4f9fd;stroke:#1a5276;stroke-width:1.5}
    .hl rect{fill:#1a5276;stroke:#1a5276}
    .haz rect{fill:#fdeef0;stroke:#a93226;stroke-width:1.5}
    .t{fill:#1a5276;font-size:14px;font-weight:700}
    .s{fill:#333;font-size:11.5px}
    .w{fill:#fff;font-size:14px;font-weight:700}
    .ws{fill:#eaf3fa;font-size:11.5px}
    .ht{fill:#a93226;font-size:13px;font-weight:700}
    .hs{fill:#7b241c;font-size:11px}
    .ar{stroke:#1a5276;stroke-width:2;fill:none;marker-end:url(#a)}
    .lbl{fill:#1a5276;font-size:11px;font-style:italic}
  </style>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#1a5276"/></marker>
  <g class="box"><rect x="15" y="75" width="125" height="70" rx="10"/><text class="t" x="29" y="103">RF / IF</text><text class="s" x="29" y="125">samples (SDR)</text></g>
  <g class="box"><rect x="180" y="75" width="145" height="70" rx="10"/><text class="t" x="194" y="99">Acquire &amp; track</text><text class="s" x="194" y="121">vector tracking</text></g>
  <g class="box"><rect x="365" y="75" width="145" height="70" rx="10"/><text class="t" x="379" y="99">Correlator</text><text class="t" x="379" y="118">features</text><text class="s" x="379" y="137">C/N0 &#183; peak shape</text></g>
  <g class="hl"><rect x="548" y="75" width="120" height="70" rx="10"/><text class="w" x="562" y="103">Measure-</text><text class="w" x="562" y="121">ments</text><text class="ws" x="562" y="139">+ uncertainty</text></g>
  <path class="ar" d="M140,110 L178,110"/>
  <path class="ar" d="M325,110 L363,110"/>
  <path class="ar" d="M510,110 L546,110"/>
  <text class="lbl" x="180" y="180">weak / distorted signals to usable measurements &amp; likelihoods</text>
</svg>
