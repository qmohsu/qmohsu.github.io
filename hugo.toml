baseURL = "https://qmohsu.github.io/"
title = "IPNL"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = true

[params]
  author = "Li-Ta Hsu"
  email = "lt.hsu@polyu.edu.hk"
  orcid = "0000-0002-0352-741X"
  scholar = "GxfOCUMAAAAJ"
  github_org = "IPNL-POLYU"
  github_personal = "qmohsu"
  linkedin = "li-ta-hsu"
  polyu_staff = "https://www.polyu.edu.hk/aae/people/academic-staff/dr-hsu-li-ta/"
  polyu_scholars = "https://research.polyu.edu.hk/en/persons/li-ta-hsu"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[permalinks]
  publications = "/publications/:slug/"
  people = "/people/:slug/"
  projects = "/projects/:slug/"
  resources = "/resources/:slug/"
  news = "/news/:slug/"
  research = "/research/:slug/"

[taxonomies]
  tag = "tags"

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

# ============================================================================
# MULTILINGUAL — EN / 简体中文 / 繁體中文
# All three languages live under /en/ /zh-cn/ /zh-tw/ prefixes.
# ============================================================================

